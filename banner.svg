<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="45%" stop-color="#1a1440"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bd93f9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#bd93f9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8be9fd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8be9fd" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="1200" height="340" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="1200" height="340" fill="url(#bg)"/>
    <circle cx="150" cy="60" r="180" fill="url(#glow1)" filter="url(#blur1)"/>
    <circle cx="1080" cy="300" r="220" fill="url(#glow2)" filter="url(#blur1)"/>

    <!-- faint grid -->
    <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
      <line x1="0" y1="85" x2="1200" y2="85"/>
      <line x1="0" y1="170" x2="1200" y2="170"/>
      <line x1="0" y1="255" x2="1200" y2="255"/>
      <line x1="300" y1="0" x2="300" y2="340"/>
      <line x1="600" y1="0" x2="600" y2="340"/>
      <line x1="900" y1="0" x2="900" y2="340"/>
    </g>

    <!-- title bar -->
    <rect x="0" y="0" width="1200" height="44" fill="#000000" fill-opacity="0.25"/>
    <circle cx="30" cy="22" r="7" fill="#ff5f56"/>
    <circle cx="55" cy="22" r="7" fill="#ffbd2e"/>
    <circle cx="80" cy="22" r="7" fill="#27c93f"/>
    <text x="600" y="27" text-anchor="middle" fill="#8a8a9e" font-size="14">kundan@iitm</text>

    <!-- terminal content -->
    <g font-size="22">
      <text x="45" y="100" fill="#50fa7b">❯</text>
      <text x="70" y="100" fill="#f8f8f2">whoami</text>

      <text x="45" y="135" fill="#bd93f9" font-weight="bold" font-size="26">Kundan Kumar</text>
      <text x="330" y="135" fill="#6272a4" font-size="20">— AI/ML Engineer, B.S. Data Science @ IIT Madras</text>

      <text x="45" y="185" fill="#50fa7b">❯</text>
      <text x="70" y="185" fill="#f8f8f2">cat focus.txt</text>

      <text x="70" y="220" fill="#8be9fd">Agentic AI</text>
      <text x="220" y="220" fill="#6272a4">·</text>
      <text x="240" y="220" fill="#ffb86c">RAG Systems</text>
      <text x="410" y="220" fill="#6272a4">·</text>
      <text x="430" y="220" fill="#ff79c6">LLM Orchestration</text>

      <text x="45" y="270" fill="#50fa7b">❯</text>
      <text x="70" y="270" fill="#f8f8f2">echo "building systems people can trust"</text>
      <rect x="595" y="255" width="14" height="24" fill="#f8f8f2">
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
